services:
  - type: web
    name: sqz-scanner-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: 8080

crons:
  - name: sqz-daily-scan
    schedule: "0 */4 * * *" # Run every 4 hours
    command: "curl http://sqz-scanner-api-on-render.com/cron"
    service: sqz-scanner-api
